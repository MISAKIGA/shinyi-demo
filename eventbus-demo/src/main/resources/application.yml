spring:
  application:
    name: eventbus-demo

eventbus:
  kafka:
    bootstrap-servers: localhost:9092
    topic: demo-topic
    group-id: demo-group
    batch-size: 16384
    linger-ms: 1
    buffer-memory: 33554432
    compression-type: snappy
    max-poll-records: 500
    enable-idempotence: false
    enable-manual-commit: false
    commit-batch-size: 100

logging:
  level:
    com.shinyi.eventbus: INFO
    root: INFO
