/* Kafka JAAS Configuration for Kerberos/GSSAPI Authentication */

KafkaServer {
  com.sun.security.auth.module.Krb5LoginModule required
    useKeyTab=true
    keyTab="/etc/kafka/kafka.keytab"
    storeKey=true
    serviceName="kafka"
    principal="kafka/kafka.example.com@EXAMPLE.COM";
};

KafkaClient {
  com.sun.security.auth.module.Krb5LoginModule required
    useKeyTab=true
    keyTab="/etc/kafka/kafka.keytab"
    storeKey=true
    serviceName="kafka"
    principal="kafka/kafka.example.com@EXAMPLE.COM";
};

/* Zookeeper SASL Client - required for Kafka preflight checks */
Client {
  com.sun.security.auth.module.Krb5LoginModule required
    useKeyTab=true
    keyTab="/etc/kafka/kafka.keytab"
    storeKey=true
    serviceName="zookeeper"
    principal="kafka/kafka.example.com@EXAMPLE.COM";
};
