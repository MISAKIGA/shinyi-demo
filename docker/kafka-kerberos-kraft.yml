# Kafka with Kerberos Authentication (KRaft mode - no Zookeeper)
# Usage: docker-compose -f docker/kafka-kerberos-kraft.yml up -d
#
# KRaft mode uses Kafka's built-in consensus instead of Zookeeper.
# Uses published KDC image: docker.io/msga/kafka-kdc-krb:latest

version: '3.8'

services:
  # Kerberos KDC
  kdc:
    image: docker.io/msga/kafka-kdc-krb:latest
    hostname: kdc
    container_name: kdc
    environment:
      KRB5_REALM: EXAMPLE.COM
      KRB5_PRINCIPAL: kafka/kafka.example.com@EXAMPLE.COM
      KRB5_PASSWORD: kafka-secret
    ports:
      - "749:749"
    networks:
      - kafka-network
    volumes:
      - kdc-data:/var/lib/kafka
      - kdc-keytab:/etc/kafka

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: kafka
    depends_on:
      kdc:
        condition: service_started
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      # Broker settings
      KAFKA_BROKER_ID: 1

      # KRaft mode (no Zookeeper)
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://10.10.10.30:9092,INTERNAL://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:SASL_PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824

      # KRaft cluster ID (22-char base64 encoded)
      CLUSTER_ID: "OTg1N2MzNzc0ZjA3NGQyNT"
      KAFKA_CLUSTER_ID: "OTg1N2MzNzc0ZjA3NGQyNT"

      # Kerberos/SASL Authentication
      KAFKA_SASL_ENABLED_MECHANISMS: GSSAPI
      # Use PLAINTEXT for inter-broker, SASL for external clients
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAINTEXT
      KAFKA_SASL_KERBEROS_SERVICE_NAME: kafka
      KAFKA_SASL_KERBEROS_PRINCIPAL: kafka/kafka.example.com@EXAMPLE.COM
      KAFKA_SASL_KERBEROS_KEYTAB: /etc/kafka/kafka.keytab

      # JAAS Configuration for Kerberos
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/jaas.conf -Djava.security.krb5.conf=/etc/kafka/krb5.conf -Dsun.security.krb5.debug=false"

      # JVM settings
      KAFKA_HEAP_OPTS: "-Xmx2G -Xms2G"
      KAFKA_JVM_PERFORMANCE_OPTS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35"
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./kafka-kerberos-jaas.conf:/etc/kafka/jaas.conf:ro
      - ./kdc/krb5.conf:/etc/kafka/krb5.conf:ro
      - ./kafka.keytab:/etc/kafka/kafka.keytab:ro
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9093 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kafka UI for debugging (uses PLAINTEXT internally)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
    networks:
      - kafka-network

volumes:
  kdc-data:
  kdc-keytab:
  kafka-data:

networks:
  kafka-network:
    driver: bridge
