# Kafka Demo Application Configuration
# This configuration supports PLAINTEXT, SASL_PLAINTEXT, SASL_SSL, and Kerberos authentication

spring:
  application:
    name: kafka-demo

server:
  port: 8080

# Kafka Demo Configuration
kafka:
  demo:
    # Connection settings - change to your Kafka broker address
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:10.10.10.30:9092}
    topic: ${KAFKA_TOPIC:test-topic}
    group-id: ${KAFKA_GROUP_ID:test-group}

    # Producer settings (Optimized for 80亿/天 high throughput)
    producer-message-count: ${KAFKA_PRODUCER_MESSAGE_COUNT:10000}
    producer-message-size: ${KAFKA_PRODUCER_MESSAGE_SIZE:1024}
    producer-acks: ${KAFKA_PRODUCER_ACKS:1}                               # Throughput mode
    producer-retries: ${KAFKA_PRODUCER_RETRIES:3}
    producer-batch-size: ${KAFKA_PRODUCER_BATCH_SIZE:131072}             # 128KB batch
    producer-linger-ms: ${KAFKA_PRODUCER_LINGER_MS:20}                   # 20ms linger
    producer-buffer-memory: ${KAFKA_PRODUCER_BUFFER_MEMORY:134217728}    # 128MB buffer
    producer-compression-type: ${KAFKA_PRODUCER_COMPRESSION_TYPE:snappy}  # Snappy compression

    # Consumer settings (Optimized for 80亿/天 high throughput)
    consumer-max-poll-records: ${KAFKA_CONSUMER_MAX_POLL_RECORDS:10000}   # 10K records
    consumer-auto-offset-reset: ${KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
    consumer-enable-auto-commit: ${KAFKA_CONSUMER_ENABLE_AUTO_COMMIT:true}
    consumer-fetch-min-bytes: ${KAFKA_CONSUMER_FETCH_MIN_BYTES:1048576}   # 1MB min fetch
    consumer-fetch-max-wait-ms: ${KAFKA_CONSUMER_FETCH_MAX_WAIT_MS:500}   # 500ms max wait
    consumer-max-partition-fetch-bytes: ${KAFKA_CONSUMER_MAX_PARTITION_FETCH_BYTES:52428800}  # 50MB

    # Pool settings (for multi-threaded production/consumption)
    producer-pool-size: ${KAFKA_PRODUCER_POOL_SIZE:8}      # Larger pool for high throughput
    consumer-pool-size: ${KAFKA_CONSUMER_POOL_SIZE:4}      # Larger pool for high throughput

    # Idempotence settings (for exactly-once semantics)
    enable-idempotence: ${KAFKA_ENABLE_IDEMPOTENCE:false}  # Enable exactly-once producer
    max-in-flight-requests-per-connection: ${KAFKA_MAX_IN_FLIGHT_REQUESTS:5}

    # Security settings
    # Supported protocols: PLAINTEXT, SASL_PLAINTEXT, SASL_SSL
    # Supported SASL mechanisms: PLAIN, SCRAM-SHA-256, SCRAM-SHA-512, GSSAPI (Kerberos)
    security-protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
    sasl-mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
    username: ${KAFKA_SASL_USERNAME:}
    password: ${KAFKA_SASL_PASSWORD:}

    # Kerberos settings (used when sasl-mechanism is GSSAPI)
    kerberos-service-name: ${KAFKA_KERBEROS_SERVICE_NAME:kafka}
    kerberos-principal: ${KAFKA_KERBEROS_PRINCIPAL:}
    kerberos-keytab: ${KAFKA_KERBEROS_KEYTAB:}
    kerberos-krb5-location: ${KAFKA_KERBEROS_KRB5_LOCATION:}

# Shinyi EventBus Kafka Configuration - Optimized for 80亿/天
shinyi:
  eventbus:
    thread-pool-core-size: 8
    thread-pool-max-size: 16
    max-queue-size: 50000
    kafka:
      default:
        is-default: true
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:10.10.10.30:9092}
        topic: ${KAFKA_TOPIC:test-topic}
        group-id: ${KAFKA_GROUP_ID:test-group}
        acks: 1
        retries: 3
        batch-size: 131072
        linger-ms: 20
        buffer-memory: 134217728
        compression-type: snappy
        max-poll-records: 10000
        fetch-min-bytes: 1048576
        fetch-max-wait-ms: 500
        max-partition-fetch-bytes: 52428800
        session-timeout-ms: 45000
        max-poll-interval-ms: 600000

# Logging
logging:
  level:
    root: INFO
    com.shinyi.eventbus: DEBUG
    org.apache.kafka: WARN
